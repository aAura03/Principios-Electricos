<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Dinámico de Lógica</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #4a4a4a; }
        .controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }
        input[type="number"] {
            width: 60px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            text-align: center;
        }
        button {
            background: #8ec5fc;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #6ba7f2; }
        table {
            margin: 0 auto;
            border-collapse: collapse;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        th, td {
            padding: 12px 20px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }
        th { background: #f0f0f0; }
        .output-btn {
            background: #ff7675;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .output-btn.active {
            background: #55efc4;
            color: #2d3436;
        }
        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-left: 5px solid #8ec5fc;
            border-radius: 5px;
            font-size: 18px;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Analizador de Tablas de Verdad</h1>
    <div class="controls">
        <label for="numVars">Número de Entradas (2 a 5):</label>
        <input type="number" id="numVars" min="2" max="5" value="3">
        <button onclick="generarTabla()">Generar Tabla</button>
    </div>

    <div id="tableContainer"></div>

    <div class="result-box">
        <strong>Ecuación Booleana (Mintérminos):</strong><br>
        <span id="ecuacion">Y = 0</span>
    </div>
</div>

<script>
    const letras = ['A', 'B', 'C', 'D', 'E'];
    let numVars = 3;

    function generarTabla() {
        numVars = parseInt(document.getElementById('numVars').value);
        if(numVars < 2 || numVars > 5) {
            alert("Por favor elige entre 2 y 5 variables para mantener la estabilidad visual.");
            return;
        }

        const filas = Math.pow(2, numVars);
        let html = '<table><thead><tr>';
        
        // Crear encabezados (A, B, C...)
        for(let i = 0; i < numVars; i++) {
            html += `<th>${letras[i]}</th>`;
        }
        html += '<th>Salida (Y)</th></tr></thead><tbody>';

        // Crear filas con combinaciones binarias
        for(let i = 0; i < filas; i++) {
            // Convertir número a binario rellenando con ceros a la izquierda
            let binario = i.toString(2).padStart(numVars, '0');
            html += '<tr>';
            
            for(let j = 0; j < numVars; j++) {
                html += `<td>${binario[j]}</td>`;
            }
            // Botón interactivo para la salida
            html += `<td><button class="output-btn" data-row="${i}" data-bin="${binario}" onclick="toggleOutput(this)">0</button></td>`;
            html += '</tr>';
        }
        html += '</tbody></table>';

        document.getElementById('tableContainer').innerHTML = html;
        actualizarEcuacion(); // Reinicia la ecuación
    }

    function toggleOutput(btn) {
        if(btn.innerText === "0") {
            btn.innerText = "1";
            btn.classList.add("active");
        } else {
            btn.innerText = "0";
            btn.classList.remove("active");
        }
        actualizarEcuacion();
    }

    function actualizarEcuacion() {
        const botones = document.querySelectorAll('.output-btn.active');
        let terminos = [];

        botones.forEach(btn => {
            let bin = btn.getAttribute('data-bin');
            let termino = "";
            for(let i = 0; i < numVars; i++) {
                // Si es 1, pone la letra normal. Si es 0, pone la letra negada (')
                termino += (bin[i] === '1') ? letras[i] : letras[i] + "'";
            }
            terminos.push(termino);
        });

        const spanEcuacion = document.getElementById('ecuacion');
        if(terminos.length === 0) {
            spanEcuacion.innerText = "Y = 0";
        } else if(terminos.length === Math.pow(2, numVars)) {
            spanEcuacion.innerText = "Y = 1";
        } else {
            spanEcuacion.innerText = "Y = " + terminos.join(" + ");
        }
    }

    // Generar la tabla inicial al cargar
    generarTabla();
</script>

</body>
</html>
